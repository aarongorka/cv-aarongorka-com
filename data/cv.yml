      - Built ingestion pipelines using Fluentd/Fluent Bit for structured, searchable logs
      - Established observability patterns across engineering teams

      ##### Security & Compliance Enablement

      - Delivered platform changes required for **SOC 2 and PCI DSS compliance**
      - Ensured infrastructure and deployment practices aligned with security standards

      ##### Technical Leadership

      - Acted as senior technical authority across engagements, influencing architecture and delivery strategy
      - Partnered with product and engineering leadership to align platform capabilities with business outcomes
      - Drove adoption of modern engineering practices across teams

